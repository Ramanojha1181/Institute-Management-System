            align-items: center;
            /* background:linear-gradient(135deg,#4f46e5,#06b6d4); */
            padding: 30px;

        .form-container {
            /* height: 100%; */
            width: 100%;
            max-width: 900px;
            background: #e1dfdf;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .form-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-title h1 {
            font-size: 35px;
            color: #0f172a;
            margin-bottom: 10px;
        }

        .form-title p {
            color: #64748b;
            font-size: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 22px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            margin-bottom: 8px;
            color: #1e293b;
            font-weight: 500;
            font-size: 15px;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            padding: 14px;
            border: 2px solid #dbeafe;
            border-radius: 14px;
            outline: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 10px rgba(37, 99, 235, 0.2);
        }

        textarea {
            resize: none;
            height: 120px;
        }

        .gender-box {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .gender-box label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
        }

        .submit-btn {
            margin-top: 30px;
            text-align: center;
        }

        .submit-btn button {
            padding: 15px 45px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .submit-btn button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        @media(max-width:768px) {

            .form-container {
                padding: 20px;
            }

            .form-title h1 {
                font-size: 28px;
            }

        }
    </style>

</head>

<body>

    <div class="form-container">

        <div class="form-title">
            <h1>🎓 Teacher Registration Form</h1>
            <p>Fill all the student details carefully</p>
        </div>

        <form>

            <div class="form-grid">

                <div class="input-group">
                    <label>👨‍🎓 Full Name</label>
                    <input type="text" placeholder="Enter Roll Number">
                </div>

                <div class="input-group">
                    <label>🆔 Teacher ID</label>
                    <input type="text" placeholder="Enter Full Name">
                </div>

                <div class="input-group">
                    <label>📧 Email (Optional)</label>
                    <input type="email" placeholder="Enter Email">
                </div>

                <div class="input-group">
                    <label>🔒 Password</label>
                    <input type="password" placeholder="Enter Password">
                </div>

                <div class="input-group">
                    <label>📅 Join Date</label>
                    <input type="date">
                </div>

                <div class="input-group">
                    <label>🏫 Class</label>
                    <select>
                        <option>Select Class</option>
                        <option>1st</option>
                        <option>2nd</option>
                        <option>3rd</option>
                        <option>4th</option>
                        <option>5th</option>
                        <option>6th</option>
                        <option>7th</option>
                        <option>8th</option>
                        <option>9th</option>
                        <option>10th</option>
                        <option>11th</option>
                        <option>12th</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>📘 Section</label>
                    <select>
                        <option>Select Section</option>
                        <option>A</option>
                        <option>B</option>
                        <option>C</option>
                        <option>D</option>
                    </select>
                </div>


                <div class="input-group">
                    <label>📅 Phone No.</label>
                    <input type="number" placeholder="Enter Phone No.">
                </div>

                <div class="input-group">
                    <label>📅 Date of Birth</label>
                    <input type="date">
                </div>

                <div class="input-group">
                    <label>Profile Picture</label>
                    <input type="file" style="height: auto; width: 400px; background-color: white;">
                </div>

                <div class="input-group">
                    <label>💰 Salary</label>
                    <input type="number" placeholder="Enter Assign Salary">
                </div>

                <div class="input-group">
                    <label> 🎓 Qualification</label>
                    <input type="text" placeholder="Enter your qualification">
                </div>

                <div class="input-group">
                    <label>📚 Specilization-Subject</label>
                    <input type="text" placeholder="Enter Your Specialization-subjectx">
                </div>

            </div>

            <div class="input-group" style="margin-top:25px;">
                <label>⚧ Gender</label>

                <div class="gender-box">
                    <label><input type="radio" name="gender"> Male</label>
                    <label><input type="radio" name="gender"> Female</label>
                    <label><input type="radio" name="gender"> Other</label>
                </div>
            </div>



            <div class="input-group" style="margin-top:25px;">
                <label>🏠 Address</label>
                <textarea placeholder="Enter Full Address"></textarea>
            </div>

            <div class="submit-btn">
                <button type="submit">✅ Register Student</button>
            </div>

        </form>

    </div>

</body>

</html>
